{% extends "base.html" %}
{% block title %}登录 — 美食在线{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shop text-primary" style="font-size:2.5rem;"></i>
                    <h3>欢迎回来</h3>
                    <p class="text-muted">登录您的账号开始点单</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="alert alert-danger d-none" id="loginError"></div>
                    <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                </form>
                <p class="text-center mt-3 mb-0">还没有账号？<a href="/register">立即注册</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (res.ok) { window.location.href = '/menu'; }
        else { errEl.textContent = data.error; errEl.classList.remove('d-none'); }
    } catch { errEl.textContent = '网络错误，请重试'; errEl.classList.remove('d-none'); }
});
</script>
{% endblock %}
